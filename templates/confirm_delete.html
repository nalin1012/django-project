{% extends 'base.html' %}

{% block title %}Delete Post | Django Blog{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger shadow-lg">
            <div class="card-body p-5 text-center">
                <h2 class="h4 mb-4">⚠️ Delete Post?</h2>
                
                <div class="alert alert-warning mb-4">
                    <strong>Are you sure you want to delete this post?</strong>
                    <p class="mb-2 mt-3">This action cannot be undone.</p>
                    <p class="mb-0">
                        <strong>{{ post.title }}</strong>
                    </p>
                </div>
                
                <form method="post" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger btn-lg me-2">
                        🗑️ Yes, Delete
                    </button>
                    <a href="{% url 'blog-detail' post.pk %}" class="btn btn-secondary btn-lg">
                        ← Cancel
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
